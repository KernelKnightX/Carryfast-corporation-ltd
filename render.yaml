services:
  - type: web
    name: cfc-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: UPLOAD_DIR
        value: /var/app/uploads
      - key: PUBLIC_BASE_URL
        value: https://carryfast-corporation-ltd.onrender.com
    persistentDisk:
      name: uploads
      mountPath: /var/app/uploads
      sizeGB: 10
